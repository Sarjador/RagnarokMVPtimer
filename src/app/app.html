<div class="app-shell">
  <nav class="app-nav">
    <div class="nav-brand">
      <span class="nav-icon">⚔️</span>
      <span class="nav-title">RO MVP Timer</span>
    </div>
    <div class="nav-links">
      <a routerLink="/timers" routerLinkActive="active" class="nav-link">{{ t('nav.timers') }}</a>
      <a routerLink="/settings" routerLinkActive="active" class="nav-link">{{ t('nav.settings') }}</a>
    </div>
  </nav>

  <main class="app-content">
    <router-outlet />
  </main>

  <footer class="app-footer">
    <span class="footer-text">{{ t('footer.support-text') }}</span>
    <button class="footer-kofi-btn" type="button" (click)="openKoFi()">
      {{ t('footer.kofi-link') }}
    </button>
  </footer>
</div>
